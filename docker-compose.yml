services:

  yaasdb:
    image: postgres:16
    environment:
      - POSTGRES_USER=yeoreum
      - POSTGRES_PASSWORD=0128
    volumes:
      - databaseVolumesPostgres:/var/lib/postgresql/data
    ports:
      - "15432:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "yeoreum00128@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "yeoreum!"
    ports:
      - "18080:80"
    depends_on:
      - yaasdb

  yaas:
    image: yeoreum/yaas:2.0.0
    env_file:
      - ./storage-legacy/.env
    environment:
      - DATABASE_URL=postgres://yeoreum:0128@yaasdb:5432/yaasdb
      - YAAS_STORAGE_ROOT=/yaas/storage/s1_Yeoreum/s12_UserStorage/s123_Storage
      - YAAS_ASSET_ROOT=/yaas/storage/s1_Yeoreum
    working_dir: /yaas
    command: python -m uvicorn backend.b1_Main:app --host 0.0.0.0 --port 8000
    ports:
      - "15174:5174"
      - "18000:8000"
    volumes:
      - ./agent:/yaas/agent
      - ./backend:/yaas/backend
      - ./frontend:/yaas/frontend
      - ./extension:/yaas/extension
      - ./storage-legacy:/yaas/storage
      - ./.git:/yaas/.git
      - ./.gitignore:/yaas/.gitignore
      - ./docker-compose.yml:/yaas/docker-compose.yml
      - ./dockerfile:/yaas/dockerfile
    depends_on:
      - yaasdb

  frontend:
    image: yeoreum/yaas-frontend:2.0.0
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://127.0.0.1:18000
    ports:
      - "5175:5175"
    depends_on:
      - yaas

  selenium:
    image: seleniarm/standalone-chromium
    volumes:
      - /dev/shm:/dev/shm
    ports:
      - "14444:4444"
    depends_on:
      - yaasdb
      - yaas

volumes:
  databaseVolumesPostgres:
